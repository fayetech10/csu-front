<div class="min-h-screen flex items-center justify-center bg-[#f8fafb] relative overflow-hidden login-bg">
    <!-- Decorative Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-sencsu-green/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-blue-500/10 rounded-full blur-[100px]"></div>

    <div class="w-full max-w-[440px] px-6 relative z-10">
        <div
            class="bg-white rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-gray-100 p-8 md:p-10 page-anim">

            <!-- Logo & Title -->
            <div class="text-center mb-10">
                <div
                    class="w-20 h-20 bg-sencsu-green/10 rounded-[24px] flex items-center justify-center mx-auto mb-6 shadow-sm border border-sencsu-green/5">
                    <span class="material-symbols-outlined text-4xl text-sencsu-green">flag</span>
                </div>
                <h1 class="text-2xl font-black text-gray-900 tracking-tight leading-tight">Bienvenue sur SenCSU</h1>
                <p class="text-sm text-gray-400 mt-2">Connectez-vous pour gérer les enrôlements</p>
            </div>

            <!-- Login Form -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

                <div *ngIf="error"
                    class="bg-red-50 text-red-500 text-xs font-bold p-4 rounded-2xl border border-red-100 animate-fade-in flex items-center gap-3">
                    <span class="material-symbols-outlined text-lg">warning</span>
                    {{ error }}
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-1">Identifiant
                        WhatsApp / Email</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 material-symbols-outlined text-lg">phone_android</span>
                        <input type="text" formControlName="email"
                            class="w-full bg-gray-50 border-2 border-transparent focus:border-sencsu-green/20 focus:bg-white rounded-2xl py-3.5 pl-12 pr-4 text-sm font-semibold text-gray-800 transition-all outline-none placeholder:text-gray-300 shadow-sm"
                            placeholder="Ex: 771234567">
                        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                            class="text-[9px] text-red-500 mt-1 pl-1">Identifiant requis.</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-1">Mot de
                        passe</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 material-symbols-outlined text-lg">lock</span>
                        <input type="password" formControlName="password"
                            class="w-full bg-gray-50 border-2 border-transparent focus:border-sencsu-green/20 focus:bg-white rounded-2xl py-3.5 pl-12 pr-4 text-sm font-semibold text-gray-800 transition-all outline-none placeholder:text-gray-300 shadow-sm"
                            placeholder="••••••••">
                        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                            class="text-[9px] text-red-500 mt-1 pl-1">Mot de passe requis (min. 4 car.).</p>
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox"
                            class="w-4 h-4 rounded border-gray-300 text-sencsu-green focus:ring-sencsu-green/20 cursor-pointer">
                        <span class="text-xs text-gray-500 group-hover:text-gray-700 transition-colors">Se souvenir de
                            moi</span>
                    </label>
                    <a href="#" class="text-xs font-bold text-sencsu-green hover:underline">Oublié ?</a>
                </div>

                <button type="submit" [disabled]="loginForm.invalid || loading"
                    class="w-full bg-sencsu-green hover:bg-sencsu-green/90 disabled:opacity-50 text-white font-black py-4 rounded-2xl shadow-xl shadow-sencsu-green/20 transition-all transform active:scale-[0.98] border-0 cursor-pointer flex items-center justify-center gap-3">
                    <span *ngIf="!loading">Se Connecter</span>
                    <div *ngIf="loading"
                        class="w-5 h-5 border-3 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>

            <!-- Footer Info -->
            <div class="mt-10 text-center border-t border-gray-50 pt-8">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Système de gestion SenCSU •
                    v2.0</p>
            </div>
        </div>
    </div>
</div>
