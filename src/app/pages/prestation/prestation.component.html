<div class="page-anim space-y-6">
  <div>
    <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Prestations</h1>
    <p class="text-sm text-gray-400 mt-1">Catalogue des prestations médicales couvertes par la CSU</p>
  </div>

  <!-- Categories KPI -->
  <div class="grid grid-cols-2 xl:grid-cols-4 gap-4">
    <app-stat-card *ngFor="let c of categories" [label]="c.label" [value]="c.count" [icon]="c.icon" trend="prestations"
      sub="couvertes" [color]="c.color" />
  </div>

  <!-- Table -->
  <div class="card overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-gray-500 text-[20px]">medication</span>
        <h2 class="text-sm font-bold text-gray-800">Liste des prestations couvertes</h2>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Prestation</th>
            <th>Catégorie</th>
            <th>Description</th>
            <th>Taux de couverture</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of prestations; let i = index">
            <td class="text-gray-400 font-mono text-xs">{{ i + 1 }}</td>
            <td>
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-gray-400 text-lg">{{ p.icon }}</span>
                <span class="font-semibold text-gray-800">{{ p.nom }}</span>
              </div>
            </td>
            <td><span [class]="categorieClass(p.categorie)">{{ p.categorie }}</span></td>
            <td class="text-xs text-gray-500 max-w-xs">{{ p.description }}</td>
            <td>
              <div class="flex items-center gap-2">
                <div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden min-w-[80px]">
                  <div class="h-full rounded-full"
                    [class]="p.taux === 100 ? 'bg-sencsu-green' : p.taux >= 80 ? 'bg-blue-500' : 'bg-yellow-400'"
                    [style.width.%]="p.taux"></div>
                </div>
                <span [class]="tauxClass(p.taux)">{{ p.taux }}%</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
