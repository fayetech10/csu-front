<header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 md:px-6 gap-3 md:gap-4 flex-shrink-0 z-10">
  <!-- Mobile Menu Toggle -->
  <button
    class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-600 hover:bg-gray-100 transition-all border-0 cursor-pointer"
    (click)="toggleSidebar()">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <h1 class="flex-1 text-sm md:text-base font-bold text-gray-800 truncate">{{ pageTitle }}</h1>

  <span class="hidden xl:block text-xs md:text-sm text-gray-400 capitalize">{{ today }}</span>

  <div class="hidden sm:block w-px h-5 bg-gray-200"></div>

  <button
    class="relative w-9 h-9 flex items-center justify-center bg-gray-50 rounded-xl text-gray-500 hover:bg-gray-100 transition-colors border-0 cursor-pointer">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
      <path d="M13.73 21a2 2 0 0 1-3.46 0" />
    </svg>
    <span class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-red-500 rounded-full border-2 border-white"></span>
  </button>

  <div class="flex items-center gap-3 md:gap-4 pl-2">
    <button
      class="w-9 h-9 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-100 rounded-xl transition-all border-0 cursor-pointer shadow-sm shadow-red-500/5 group"
      title="Déconnexion" (click)="logout()">
      <span class="text-xs group-hover:scale-110 transition-transform">🚪</span>
    </button>

    <div class="flex items-center gap-2 cursor-pointer group">
      <div
        class="w-8 h-8 md:w-9 md:h-9 rounded-full bg-gradient-to-br from-sencsu-green to-sencsu-green-mid flex items-center justify-center text-white text-[10px] md:text-xs font-bold shadow-sm group-hover:scale-105 transition-transform overflow-hidden">
        <img *ngIf="authService.currentUser()?.photo" [src]="authService.currentUser()?.photo"
          class="w-full h-full object-cover">
        <span *ngIf="!authService.currentUser()?.photo">{{ authService.currentUser()?.nom?.[0] }}{{
          authService.currentUser()?.prenoms?.[0] }}</span>
      </div>
      <div class="hidden sm:block leading-tight">
        <p class="text-[10px] md:text-xs font-semibold text-gray-700 capitalize">
          {{ authService.currentUser()?.prenoms }} {{ authService.currentUser()?.nom }}
        </p>
        <p class="text-[8px] md:text-[10px] text-gray-400 capitalize">{{ authService.currentUser()?.role ||
          'Utilisateur' }}</p>
      </div>
    </div>
  </div>
</header>
