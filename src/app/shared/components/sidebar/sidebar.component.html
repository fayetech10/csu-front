<!-- Overlay backdrop for mobile -->
<div *ngIf="isOpen$ | async" class="lg:hidden fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[110]"
  (click)="closeSidebar()"></div>

<aside
  class="fixed lg:static inset-y-0 left-0 z-[120] w-64 bg-sencsu-green-dark flex flex-col overflow-y-auto flex-shrink-0 transition-transform duration-300 lg:translate-x-0"
  [class.-translate-x-full]="!(isOpen$ | async)">

  <!-- Logo & Close Button -->
  <div class="px-5 py-6 border-b border-white/10 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center flex-shrink-0 shadow overflow-hidden">
        <img src="assets/logo.png" alt="SenCSU Logo" class="w-full h-full object-cover">
      </div>
      <div>
        <div class="text-base font-extrabold text-white tracking-tight leading-none">SENCSU</div>
        <div class="text-[10px] text-white/40 uppercase tracking-widest mt-0.5">Couverture Sanitaire</div>
      </div>
    </div>
    <!-- Close button for mobile -->
    <button
      class="lg:hidden w-9 h-9 rounded-lg bg-white/10 text-white flex items-center justify-center hover:bg-white/20 transition-all border-0 cursor-pointer"
      (click)="closeSidebar()">
      <span class="material-symbols-outlined text-sm">close</span>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 space-y-0.5">
    <ng-container *ngFor="let item of navItems">
      <div *ngIf="getSectionLabel(item) as section"
        class="text-[10px] font-bold uppercase tracking-widest text-white/30 px-4 pt-5 pb-2 mt-2">
        {{ section }}
      </div>
      <a [routerLink]="item.route" routerLinkActive="bg-white/10 text-white font-medium shadow-sm"
        [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
        class="flex items-center gap-3 px-4 py-2.5 mx-2 rounded-xl text-white/70 hover:bg-white/5 hover:text-white transition-all cursor-pointer group"
        (click)="closeSidebar()">
        <span class="material-symbols-outlined text-[20px] transition-transform group-hover:scale-110 flex-shrink-0">{{
          item.icon }}</span>
        <span class="flex-1 truncate text-sm">{{ item.label }}</span>
        <span *ngIf="item.badge"
          class="ml-auto bg-sencsu-yellow text-gray-900 text-[10px] font-bold px-2 py-0.5 rounded-full leading-none">
          {{ item.badge }}
        </span>
      </a>
    </ng-container>
  </nav>

  <!-- Footer -->
  <div class="px-5 py-3 border-t border-white/10 text-center mt-auto">
    <p class="text-[10px] text-white/25">© 2025 SENCSU · Senegal</p>
  </div>
</aside>
